<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pet Care{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="page-backdrop"></div>
    <header class="site-header">
        <nav class="site-nav">
            <a class="brand" href="{{ url_for('home') }}">
                <span class="brand-mark">
                    <img src="{{ url_for('static', filename='AdobeStock_532811302.png') }}" alt="Pet Care logo">
                </span>
                <span class="brand-text">Pet Care</span>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('index') }}">Pet Plan</a>
                <a href="{{ url_for('care_cost_support') }}">Care Cost Support</a>
                <a href="{{ url_for('about') }}">About</a>
            </div>
        </nav>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
